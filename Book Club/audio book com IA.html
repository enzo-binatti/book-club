<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criador de Audiobooks com IA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a2647, #1c1c1c, #bdc3c7);
      background-size: 300% 300%;
      animation: gradientAnimation 10s ease infinite;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #0a2647;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    form {
      margin-bottom: 30px;
      text-align: left;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #0a2647;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #0a2647;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: #bdc3c7;
      box-shadow: 0 0 8px rgba(189, 195, 199, 0.5);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0a2647, #bdc3c7);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #bdc3c7, #0a2647);
    }

    .audio-preview {
      margin-top: 30px;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: none;
    }

    .audio-preview:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .audio-preview audio {
      width: 100%;
      margin-top: 15px;
    }

    .progress-container {
      margin-top: 20px;
      width: 100%;
      background-color: #f1f1f1;
      border-radius: 5px;
      display: none;
    }

    .progress-bar {
      height: 20px;
      background: linear-gradient(135deg, #0a2647, #bdc3c7);
      border-radius: 5px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      color: #0a2647;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .controls button {
      flex: 1;
      padding: 8px;
      font-size: 14px;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    footer a {
      color: #0a2647;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Estilos para os personagens */
    .character-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }

    .character-option {
      flex: 1;
      min-width: 120px;
      border: 2px solid #0a2647;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #0a2647;
    }

    .character-option:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .character-option.selected {
      background: #0a2647;
      color: white;
      border-color: #bdc3c7;
    }

    .character-option img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 5px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
      
      .container {
        padding: 20px;
      }
      
      .character-option {
        min-width: calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Criador de Audiobooks com IA</h1>

    <form id="audiobookForm">
      <div class="form-group">
        <label for="title">Título do Audiobook:</label>
        <input type="text" id="title" placeholder="Digite o título do audiobook" required>
      </div>

      <div class="form-group">
        <label for="voice">Selecione uma Voz:</label>
        <select id="voice" required>
          <option value="">Selecione uma voz...</option>
          <option value="Google português do Brasil">Feminina (Padrão)</option>
          <option value="Microsoft Maria - Portuguese (Brazil)">Feminina (Maria)</option>
          <option value="Microsoft Joana - Portuguese (Brazil)">Feminina (Joana)</option>
          <option value="Microsoft Antonio - Portuguese (Brazil)">Masculina (Antônio)</option>
          <option value="personagens">Vozes de Personagens</option>
        </select>
      </div>

      <div class="form-group" id="characterGroup" style="display: none;">
        <label>Selecione um Personagem:</label>
        <div class="character-options">
          <div class="character-option" data-voice="bob">
            <img src="https://i.imgur.com/JR3ZfQa.png" alt="Bob Esponja">
            <div>Bob Esponja</div>
          </div>
          <div class="character-option" data-voice="patrick">
            <img src="https://i.imgur.com/9XzTJ2u.png" alt="Patrick">
            <div>Patrick</div>
          </div>
          <div class="character-option" data-voice="pica-pau">
            <img src="https://i.imgur.com/5Q4yWzP.png" alt="Pica-Pau">
            <div>Pica-Pau</div>
          </div>
          <div class="character-option" data-voice="perna-longa">
            <img src="https://i.imgur.com/8tKfKlN.png" alt="Perna Longa">
            <div>Perna Longa</div>
          </div>
        </div>
        <input type="hidden" id="characterVoice" value="">
      </div>

      <div class="form-group">
        <label for="content">Texto do Audiobook:</label>
        <textarea id="content" placeholder="Insira o texto que deseja converter em áudio" required></textarea>
      </div>

      <button type="submit" id="generateBtn">Gerar Audiobook</button>
    </form>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
      <div class="status" id="statusText">Preparando para gerar áudio...</div>
    </div>

    <div class="audio-preview" id="audioPreview">
      <h2 id="audioTitle">Prévia do Audiobook</h2>
      <div class="controls">
        <button id="playBtn">Reproduzir</button>
        <button id="pauseBtn">Pausar</button>
        <button id="stopBtn">Parar</button>
        <button id="downloadBtn">Download</button>
      </div>
      <audio id="audioPlayer" controls></audio>
    </div>

    <footer>
      Entre em contato conosco: <a href="mailto:suporte@audiobookcreator.com">suporte@audiobookcreator.com</a>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const audiobookForm = document.getElementById('audiobookForm');
      const audioPreview = document.getElementById('audioPreview');
      const audioPlayer = document.getElementById('audioPlayer');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const statusText = document.getElementById('statusText');
      const generateBtn = document.getElementById('generateBtn');
      const playBtn = document.getElementById('playBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stopBtn = document.getElementById('stopBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const audioTitle = document.getElementById('audioTitle');
      const voiceSelect = document.getElementById('voice');
      const characterGroup = document.getElementById('characterGroup');
      const characterVoiceInput = document.getElementById('characterVoice');

      let audioChunks = [];
      let mediaRecorder;
      let audioStream;
      let audioBlob;

      // Configuração das vozes dos personagens
      const characterVoices = {
        'bob': {
          pitch: 1.4,  // Voz mais aguda
          rate: 1.1,   // Fala um pouco mais rápida
          volume: 1,
          lang: 'pt-BR',
          name: 'Google português do Brasil'
        },
        'patrick': {
          pitch: 0.8,  // Voz mais grave
          rate: 0.7,   // Fala mais lenta
          volume: 1,
          lang: 'pt-BR',
          name: 'Microsoft Antonio - Portuguese (Brazil)'
        },
        'pica-pau': {
          pitch: 1.6,  // Voz muito aguda
          rate: 1.5,   // Fala rápida
          volume: 1,
          lang: 'pt-BR',
          name: 'Google português do Brasil'
        },
        'perna-longa': {
          pitch: 0.6,  // Voz muito grave
          rate: 0.9,   // Fala com pausas
          volume: 0.8,
          lang: 'pt-BR',
          name: 'Microsoft Antonio - Portuguese (Brazil)'
        }
      };

      // Mostrar/ocultar seleção de personagens
      voiceSelect.addEventListener('change', () => {
        if (voiceSelect.value === 'personagens') {
          characterGroup.style.display = 'block';
        } else {
          characterGroup.style.display = 'none';
          // Remove seleção dos personagens
          document.querySelectorAll('.character-option').forEach(opt => {
            opt.classList.remove('selected');
          });
          characterVoiceInput.value = '';
        }
      });

      // Seleção de personagem
      document.querySelectorAll('.character-option').forEach(option => {
        option.addEventListener('click', function() {
          // Remove seleção anterior
          document.querySelectorAll('.character-option').forEach(opt => {
            opt.classList.remove('selected');
          });
          
          // Adiciona seleção atual
          this.classList.add('selected');
          characterVoiceInput.value = this.dataset.voice;
        });
      });

      // Verifica suporte à API Web Speech
      if (!('speechSynthesis' in window) || !('MediaRecorder' in window)) {
        alert('Seu navegador não suporta todas as funcionalidades necessárias. Recomendamos usar Chrome ou Edge.');
        generateBtn.disabled = true;
      }

      audiobookForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('title').value;
        const voice = document.getElementById('voice').value;
        const character = document.getElementById('characterVoice').value;
        const content = document.getElementById('content').value;

        if (!content.trim()) {
          alert('Por favor, insira algum texto para gerar o audiobook.');
          return;
        }

        if (voice === 'personagens' && !character) {
          alert('Por favor, selecione um personagem!');
          return;
        }

        if (voice !== 'personagens' && !voice) {
          alert('Por favor, selecione uma voz.');
          return;
        }

        generateBtn.disabled = true;
        progressContainer.style.display = 'block';
        audioPreview.style.display = 'none';
        statusText.textContent = 'Preparando para gerar áudio...';
        progressBar.style.width = '0%';

        try {
          if (voice === 'personagens') {
            await generateCharacterAudio(content, character, title);
          } else {
            await generateStandardAudio(content, voice, title);
          }
        } catch (error) {
          console.error('Erro ao gerar áudio:', error);
          statusText.textContent = 'Erro ao gerar áudio. Tente novamente.';
          generateBtn.disabled = false;
        }
      });

      async function generateStandardAudio(text, voiceName, title) {
        audioChunks = [];
        
        // Configuração da síntese de voz padrão
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = await getVoice(voiceName);
        utterance.rate = 0.9;
        utterance.pitch = 1;
        utterance.volume = 1;

        await processAudio(utterance, title);
      }

      async function generateCharacterAudio(text, character, title) {
        audioChunks = [];
        
        // Configuração da voz do personagem
        const voiceSettings = characterVoices[character];
        const utterance = new SpeechSynthesisUtterance(text);
        
        utterance.pitch = voiceSettings.pitch;
        utterance.rate = voiceSettings.rate;
        utterance.volume = voiceSettings.volume;
        utterance.lang = voiceSettings.lang;
        
        // Encontra a voz base mais adequada
        const voices = await getVoices();
        utterance.voice = voices.find(v => v.name === voiceSettings.name) || voices[0];

        await processAudio(utterance, title);
      }

      async function processAudio(utterance, title) {
        // Configuração do MediaRecorder para capturar o áudio
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(audioStream);

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            audioChunks.push(e.data);
          }
        };

        mediaRecorder.onstop = () => {
          audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          const audioUrl = URL.createObjectURL(audioBlob);
          
          audioPlayer.src = audioUrl;
          audioTitle.textContent = title || 'Prévia do Audiobook';
          audioPreview.style.display = 'block';
          progressContainer.style.display = 'none';
          generateBtn.disabled = false;
          
          // Configura o botão de download
          downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = audioUrl;
            a.download = `${title || 'audiobook'}.wav`;
            a.click();
          };
        };

        // Atualização de progresso
        const totalSentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
        let processedSentences = 0;
        
        utterance.onboundary = (event) => {
          if (event.name === 'sentence') {
            processedSentences++;
            const progress = Math.min(100, Math.round((processedSentences / totalSentences) * 100));
            progressBar.style.width = `${progress}%`;
            statusText.textContent = `Gerando áudio... ${progress}%`;
          }
        };

        utterance.onend = () => {
          setTimeout(() => {
            mediaRecorder.stop();
            audioStream.getTracks().forEach(track => track.stop());
          }, 500);
        };

        // Inicia a gravação e a síntese de voz
        mediaRecorder.start();
        speechSynthesis.speak(utterance);
      }

      async function getVoice(voiceName) {
        return new Promise((resolve) => {
          const voices = speechSynthesis.getVoices();
          if (voices.length > 0) {
            const selectedVoice = voices.find(v => v.name === voiceName) || 
                                 voices.find(v => v.lang === 'pt-BR') || 
                                 voices[0];
            resolve(selectedVoice);
          } else {
            speechSynthesis.onvoiceschanged = () => {
              const voices = speechSynthesis.getVoices();
              const selectedVoice = voices.find(v => v.name === voiceName) || 
                                   voices.find(v => v.lang === 'pt-BR') || 
                                   voices[0];
              resolve(selectedVoice);
            };
          }
        });
      }

      async function getVoices() {
        return new Promise(resolve => {
          let voices = speechSynthesis.getVoices();
          if (voices.length) {
            resolve(voices);
          } else {
            speechSynthesis.onvoiceschanged = () => {
              voices = speechSynthesis.getVoices();
              resolve(voices);
            };
          }
        });
      }

      // Controles do player de áudio
      playBtn.addEventListener('click', () => {
        audioPlayer.play();
      });

      pauseBtn.addEventListener('click', () => {
        audioPlayer.pause();
      });

      stopBtn.addEventListener('click', () => {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
      });
    });
  </script>
</body>
</html>
