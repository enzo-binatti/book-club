<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda de Livros Usados</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a2647, #1c1c1c, #bdc3c7);
      background-size: 300% 300%;
      animation: gradientAnimation 10s ease infinite;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #0a2647;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    form {
      margin-bottom: 30px;
      text-align: left;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #0a2647;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #0a2647;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      border-color: #bdc3c7;
      box-shadow: 0 0 8px rgba(189, 195, 199, 0.5);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0a2647, #bdc3c7);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #bdc3c7, #0a2647);
    }

    .book-list {
      margin-top: 30px;
      text-align: left;
    }

    .book-item {
      background: #fff;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .book-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .book-item img {
      width: 120px;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .book-info {
      flex-grow: 1;
    }

    .book-info h3 {
      margin-bottom: 10px;
      color: #0a2647;
      font-size: 1.5rem;
    }

    .book-info p {
      margin-bottom: 5px;
      color: #333;
      line-height: 1.5;
    }

    .book-price {
      font-weight: bold;
      color: #28a745;
      font-size: 1.2rem;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    footer a {
      color: #0a2647;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Venda de Livros Usados</h1>

    <form id="bookForm">
      <div class="form-group">
        <label for="title">Título do Livro:</label>
        <input type="text" id="title" placeholder="Digite o título do livro" required>
      </div>

      <div class="form-group">
        <label for="author">Autor:</label>
        <input type="text" id="author" placeholder="Digite o nome do autor" required>
      </div>

      <div class="form-group">
        <label for="description">Descrição:</label>
        <textarea id="description" placeholder="Descreva o estado do livro"></textarea>
      </div>

      <div class="form-group">
        <label for="price">Preço (R$):</label>
        <input type="number" id="price" placeholder="Digite o preço" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="image">URL da Imagem:</label>
        <input type="text" id="image" placeholder="Cole a URL da imagem do livro" required>
      </div>

      <button type="submit">Adicionar Livro</button>
    </form>

    <div class="book-list" id="bookList"></div>

    <footer>
      Entre em contato conosco: <a href="mailto:suporte@vendalivros.com">suporte@vendalivros.com</a>
    </footer>
  </div>

  <script>
    const bookForm = document.getElementById('bookForm');
    const bookList = document.getElementById('bookList');

    let books = JSON.parse(localStorage.getItem('books')) || [];

    function renderBooks() {
      bookList.innerHTML = '';
      books.forEach((book, index) => {
        const bookItem = document.createElement('div');
        bookItem.classList.add('book-item');
        bookItem.innerHTML = `
          <img src="${book.image}" alt="Capa do livro">
          <div class="book-info">
            <h3>${book.title}</h3>
            <p><strong>Autor:</strong> ${book.author}</p>
            <p>${book.description}</p>
            <p class="book-price">R$ ${parseFloat(book.price).toFixed(2)}</p>
          </div>
        `;
        bookList.appendChild(bookItem);
      });
    }

    function saveBooks() {
      localStorage.setItem('books', JSON.stringify(books));
    }

    bookForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const author = document.getElementById('author').value;
      const description = document.getElementById('description').value;
      const price = document.getElementById('price').value;
      const image = document.getElementById('image').value;

      books.push({
        title,
        author,
        description,
        price,
        image,
      });

      bookForm.reset();
      saveBooks();
      renderBooks();
    });

    renderBooks();
  </script>
</body>
</html>
